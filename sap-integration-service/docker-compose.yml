# =============================================================================
# Orquestación del worker de integración SAP (polling OData).
#
# Ya NO se montan volúmenes de red: el worker consume la API OData de SAP a
# través del túnel seguro de Google y escribe en Firestore.
#
# Único volumen: la Service Account JSON, montada en SOLO LECTURA (:ro), que
# el Firebase Admin SDK necesita para autenticarse.
#
# Todas las rutas/IDs/credenciales se definen en el archivo .env (ver
# .env.example). El JSON de la Service Account NUNCA se incluye en la imagen
# ni en el repositorio.
# =============================================================================
services:
  sap-integration:
    build:
      context: .
      dockerfile: Dockerfile
    image: cidyt/sap-integration-worker:latest
    container_name: sap-integration-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /app/sa.json
    volumes:
      # Service Account montada en SOLO LECTURA en una ruta interna segura.
      - "${GOOGLE_APPLICATION_CREDENTIALS_HOST:?Define GOOGLE_APPLICATION_CREDENTIALS_HOST en .env}:/app/sa.json:ro"
    # Logs accesibles vía `docker compose logs -f` (rotados para no llenar disco).
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
